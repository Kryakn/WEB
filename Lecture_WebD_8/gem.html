<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Canva Editor Workspace Template</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="gem.css">
</head>
<body>

    <header class="app-navbar">
        <div class="nav-left">
            <div class="nav-brand-icon">
                <svg viewBox="0 0 24 24" width="18" height="18" fill="#00c4cc"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/></svg>
            </div>
            <span class="nav-text-link">File</span>
            <span class="nav-text-link">Resize</span>
            <span class="nav-text-link active-edit"><i class="fa-solid fa-pen"></i> Editing <i class="fa-solid fa-chevron-down" style="font-size:10px;"></i></span>
            <div class="nav-action-dividers"></div>
            <button class="nav-icon-action-btn"><i class="fa-solid fa-arrow-rotate-left"></i></button>
            <button class="nav-icon-action-btn"><i class="fa-solid fa-arrow-rotate-right"></i></button>
            <button class="nav-icon-action-btn relative-badge-target">
                <i class="fa-solid fa-cloud-arrow-up"></i>
                <span class="pink-new-badge">New</span>
            </button>
        </div>

        <div class="nav-right">
            <span class="project-title-label">Sample</span>
            <button class="premium-trial-button">
                <i class="fa-solid fa-crown gold-crown-icon"></i> Start your trial for ₹0
            </button>
            <div class="user-avatar-wrapper">
                <img src="https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?auto=format&fit=crop&w=80&h=80&q=80" alt="Profile" class="user-avatar-img">
            </div>
            <button class="nav-utility-btn"><i class="fa-solid fa-chart-simple"></i></button>
            <button class="nav-utility-btn"><i class="fa-regular fa-comment-dots"></i></button>
            <button class="presentation-mode-btn">Present <i class="fa-solid fa-chevron-down" style="font-size:10px; margin-left:6px;"></i></button>
            <button class="share-workspace-btn">Share</button>
        </div>
    </header>

    <div class="app-workspace-body">
        
        <aside class="app-left-sidebar">
            <div class="sidebar-category-tab active-tab">
                <i class="fa-solid fa-table-cells-large"></i>
                <span>Templates</span>
            </div>
            <div class="sidebar-category-tab">
                <i class="fa-solid fa-shapes"></i>
                <span>Elements</span>
            </div>
            <div class="sidebar-category-tab">
                <i class="fa-solid fa-text-height"></i>
                <span>Text</span>
            </div>
            <div class="sidebar-category-tab">
                <i class="fa-solid fa-crown"></i>
                <span class="brand-badge-dot">Brand</span>
            </div>
            <div class="sidebar-category-tab">
                <i class="fa-solid fa-cloud-arrow-up"></i>
                <span>Uploads</span>
            </div>
            <div class="sidebar-category-tab">
                <i class="fa-solid fa-paintbrush"></i>
                <span>Tools</span>
            </div>
            <div class="sidebar-category-tab">
                <i class="fa-solid fa-folder"></i>
                <span>Projects</span>
            </div>
            <div class="sidebar-category-tab">
                <i class="fa-solid fa-grip"></i>
                <span>Apps</span>
            </div>
            <div class="sidebar-category-tab">
                <i class="fa-solid fa-wand-magic-sparkles"></i>
                <span>Magic Media</span>
            </div>
            <div class="sidebar-category-tab">
                <i class="fa-solid fa-music"></i>
                <span>Audio</span>
            </div>
            <div class="sidebar-category-tab">
                <i class="fa-solid fa-video"></i>
                <span>videoforme</span>
            </div>
        </aside>

        <section class="drawer-options-panel">
            <div class="drawer-fixed-header-controls">
                <div class="drawer-search-wrapper">
                    <button class="search-nested-plus-btn">+</button>
                    <input type="text" class="drawer-input-field" placeholder="Describe your ideal design">
                    <i class="fa-solid fa-microphone mic-icon-input"></i>
                </div>

                <div class="drawer-action-row">
                    <button class="action-btn-pill btn-white"><i class="fa-solid fa-wand-magic-sparkles purple-sparkle"></i> Generate</button>
                    <button class="action-btn-pill btn-purple">Search</button>
                </div>
            </div>

            <div class="drawer-master-scroll-container">
                <div class="section-headline-row">
                    <span class="headline-title">Recently used</span>
                    <a href="#" class="headline-link-action see-all-bold">See all</a>
                </div>

                <div class="two-column-asset-grid margin-bottom-lg">
                    <div class="asset-card-thumb"><img src="image1.jpeg" alt="image1"></div>
                    <div class="asset-card-thumb"><img src="image 2.jpeg" alt=""></div>
                </div>

                <div class="section-headline-row">
                    <span class="headline-title">All results</span>
                </div>

                <div class="two-column-asset-grid padding-bottom-md">
                    <div class="asset-card-thumb"><img src="image 3.jpeg" alt=""></div>
                    <div class="asset-card-thumb"><img src="image 4.jpeg" alt=""></div>
                    <div class="asset-card-thumb"><img src="image 5.jpeg" alt=""></div>
                    <div class="asset-card-thumb"><img src="image 6.jpeg" alt=""></div>
                    <div class="asset-card-thumb"><img src="image 7.jpeg" alt=""></div>
                    <div class="asset-card-thumb"><img src="image 8.jpeg" alt=""></div>
                    <div class="asset-card-thumb"><img src="image 9.jpeg" alt=""></div>
                    <div class="asset-card-thumb"><img src="image 10.jpeg" alt=""></div>
                    <div class="asset-card-thumb"><img src="image 11.jpeg" alt=""></div>
                    <div class="asset-card-thumb"><img src="image 12.jpeg" alt=""></div>
                    <div class="asset-card-thumb"><img src="image 13.jpeg" alt=""></div>
                    <div class="asset-card-thumb"><img src="image 14.jpeg" alt=""></div>
                </div>
            </div>

            <button class="drawer-collapse-handle">
                <i class="fa-solid fa-chevron-left"></i>
            </button>
        </section>

        <main class="canvas-viewport-workspace">
            
            <div class="canvas-context-toolbar">
                <button class="toolbar-txt-action-btn border-right-divider">Edit</button>
                <div class="toolbar-color-swatch-preview" style="background-color: #ff3b30;"></div>
                <button class="toolbar-icon-option"><i class="fa-solid fa-bars"></i></button>
                <button class="toolbar-icon-option"><i class="fa-solid fa-bezier-curve"></i></button>
                <button class="toolbar-icon-option border-right-divider"><i class="fa-solid fa-border-none"></i></button>
                <button class="toolbar-txt-action-btn">Effects</button>
                <button class="toolbar-txt-action-btn">Animate</button>
                <button class="toolbar-txt-action-btn border-right-divider">Position</button>
                <button class="toolbar-icon-option"><i class="fa-solid fa-paint-roller"></i></button>
            </div>

            <div class="artboard-canvas-scroller">
                <div class="white-canvas-artboard-page">
                    
                    <div class="canvas-vector-shape shape-circle" style="background-color: #adff2f; top: 60px; left: 40px;"></div>
                    <div class="canvas-vector-shape shape-square" style="background-color: #ffd700; top: 60px; left: 260px;"></div>
                    <div class="canvas-vector-shape shape-triangle" style="top: 60px; left: 490px;"></div>
                    <div class="canvas-vector-shape shape-pentagon" style="background-color: #0000cd; top: 60px; left: 720px;"></div>
                    
                    <div class="canvas-vector-shape shape-plus" style="top: 320px; left: 40px;"></div>
                    <div class="canvas-vector-shape shape-parallelogram" style="background-color: #ba55d3; top: 330px; left: 240px;"></div>
                    <div class="canvas-vector-shape shape-arrow" style="background-color: #9370db; top: 310px; left: 490px;"></div>
                    
                    <div class="active-element-bounding-box" style="top: 320px; left: 720px;">
                        <div class="canvas-vector-shape shape-heart"></div>
                        
                        <div class="ctrl-handle top-left"></div>
                        <div class="ctrl-handle top-right"></div>
                        <div class="ctrl-handle bottom-left"></div>
                        <div class="ctrl-handle bottom-right"></div>
                        
                        <div class="active-element-floating-actions-tooltip">
                            <button class="tooltip-action"><i class="fa-regular fa-comment"></i></button>
                            <button class="tooltip-action"><i class="fa-solid fa-lock-open"></i></button>
                            <button class="tooltip-action"><i class="fa-regular fa-copy"></i></button>
                            <button class="tooltip-action"><i class="fa-regular fa-trash-can"></i></button>
                            <button class="tooltip-action"><i class="fa-solid fa-ellipsis"></i></button>
                        </div>

                        <div class="element-rotation-axis-handle">
                            <i class="fa-solid fa-arrows-rotate"></i>
                        </div>
                    </div>

                </div>
            </div>

            <footer class="workspace-status-footer-bar">
                    
                    <div class="footer-top-navigator-row">
                        <div class="page-navigator-container">
                            <div class="mini-canvas-thumbnail-card active-thumb-border">
                                <svg class="nested-svg-preview-vector-grid" viewBox="0 0 90 52">
                                    <rect x="0" y="0" width="90" height="52" fill="#ffffff"/>
                                    <circle cx="15" cy="15" r="7" fill="#adff2f"/>
                                    <rect x="30" y="8" width="14" height="14" fill="#ffd700"/>
                                    <polygon points="52,8 45,22 59,22" fill="#ff7f50"/>
                                    <polygon points="75,8 82,13 79,22 71,22 68,13" fill="#0000cd"/>
                                    <path d="M11,38 h8 v-3 h3 v3 h8 v3 h-8 v3 h-3 v-3 h-8 Z" fill="#000000" transform="scale(0.6) translate(-2, 18)"/>
                                    <polygon points="32,33 46,33 42,45 28,45" fill="#ba55d3"/>
                                    <polygon points="55,31 61,37 58,37 58,45 52,45 52,37 49,37" fill="#9370db"/>
                                    <path d="M75,35 b1.5,-2.5 4,0 0,5 -4,4 -4,-4 0,-5 4,0 Z" fill="#ff3b30" transform="scale(0.9) translate(3, 3)"/>
                                </svg>
                                <span class="page-index-indicator-tag">1</span>
                            </div>
                            <button class="add-blank-canvas-page-action-btn">
                                <i class="fa-solid fa-plus"></i>
                                <i class="fa-solid fa-chevron-down" style="font-size: 9px; margin-left: 6px;"></i>
                            </button>
                        </div>
                    </div>

                    <div class="footer-bottom-utility-row">
                        <div class="footer-left-controls">
                            <button class="footer-txt-action"><i class="fa-solid fa-notes-medical" style="margin-right:6px;"></i> Notes</button>
                            <button class="footer-txt-action"><i class="fa-regular fa-clock" style="margin-right:6px;"></i> Timer</button>
                        </div>

                        <div class="footer-right-view-zoom-controls">
                            <div class="slider-zoom-wrapper">
                                <input type="range" class="zoom-range-slider" min="10" max="200" value="53">
                                <span class="zoom-percentage-text">53%</span>
                            </div>
                            
                            <button class="footer-icon-view-action active-view-btn">
                                <i class="fa-solid fa-layer-group"></i> Pages
                            </button>
                            
                            <span class="page-count-display-text">1 / 1</span>
                            <button class="footer-icon-view-action"><i class="fa-solid fa-table-cells"></i></button>
                            <button class="footer-icon-view-action"><i class="fa-solid fa-expand"></i></button>
                            <button class="footer-icon-view-action"><i class="fa-regular fa-comments"></i></button>
                        </div>
                    </div>
                </footer>


        </main>

    </div>

</body>
</html>
