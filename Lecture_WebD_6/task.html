<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anime Card Slider</title>
    <link rel="stylesheet" href="task.css">
</head>

<body>

    <div class="container">


        <div class="card-stack">

            <div class="card top">
                <img src="https://images.unsplash.com/photo-1581833971358-2c8b550f87b3?q=80&w=1171&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D" alt="">
            </div>

            <div class="card upper">
                <img src="https://images.unsplash.com/photo-1607604276583-eef5d076aa5f?w=600&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8MTZ8fGFuaW1lfGVufDB8fDB8fHww" alt="">
            </div>

            <div class="card active">
                <img src="https://images.unsplash.com/photo-1667419675013-e5f883eb3bc0?w=600&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8NHx8em9yb3xlbnwwfHwwfHx8MA%3D%3D" alt="">
            </div>

            <div class="card lower">
                <img src="https://picsum.photos/id/1035/500/300" alt="">
            </div>

            <div class="card bottom">
                <img src="https://picsum.photos/id/1045/500/300" alt="">
            </div>

        </div>


        <div class="content">

            <div class="buttons">
                <button>⬆️</button>
                <button>⬇️</button>
            </div>

            <h1>Luffy kun</h1>

            <div class="designation">
                <span></span>
                <p>MARKETING MANAGER</p>
                <span></span>
            </div>

            <div class="dots">
                <span></span>
                <span></span>
                <span></span>
                <span></span>
                <span class="active-dot"></span>
                <span></span>
            </div>

        </div>

    </div>

</body>

</html>
