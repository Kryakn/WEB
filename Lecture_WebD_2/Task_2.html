<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Genral Infromation Form</title>
</head>
<body>
    <from action="/submit" method="post">
        <label for="first name">First Name:</label><br>
        <input type="text" id="first name" name="first name" placeholder="Enter your first name"><br><br>
       
        <label for="middle name">Midlle Name:</label><br>
        <input type="text" id="name" name="middle name" placeholder="Enter your middle name"><br><br>
       
        <label for="last name">Last Name:</label><br>
        <input type="text" id="last name" name="last name" placeholder="Enter your last name"><br><br>
       
        <label for="email">Email:</label><br>
        <input type="email" id="email" name="email" placeholder="Enter your email"><br><br>
       
        <label for="phone">Phone Number:</label><br>
        <input type="tel" id="phone" name="phone" placeholder="Enter your phone number"><br><br>
       
        <label for="gender">Gender</label><br>
        <select id="gender" name="gender">
            <option value="Male">Male</option>
            <option value="Female">Female</option>
            <option value="Other">Other</option>
            </select><br><br>
            <label for="discription" for="discription">Discription:</label><br>
            <textarea id="discription" name="discription" placeholder="Enter a discription about yourself"></textarea><br><br>
        </select><br><br>
       
        <label for="password" name="password">Password:</label><br>
        <input type="password" id="password" name="password" placeholder="Enter your passwprd"><br><br>
        <input type="Submit" value="Submit"><br><br>
        </from>
        <hr>
</body>
</html>
