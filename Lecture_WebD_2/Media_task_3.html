<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Usage of media </title>
</head>
<body>
    <h1>Media Tags in HTML</h1>
    <h2>Audio Tag</h2>
    <audio controls>
        <source src="freesound_community-theme-demo-v02-63144.mp3" type="audio/mpeg">
        Your browser does not support the audio element.
    </audio>

    <h2>Video Tag</h2>
    <video width="320" height="240" controls>
        <source src="https://www.youtube.com/watch?v=0JlMjgqduVw" type="video/mp4">
        Your browser does not support the video tag.
    </video>

    <h2>Embed tag</h2>
    <embed src="Lecture_WebD_2/eCertificate (1).pdf" type="pdf" width="600" height="400">
    <p>Your browser does not support the embed tag.</p>

    <h2>Object Tag</h2>
    <object data="https://developer.mozilla.org/en-US/docs/Web/HTML/Reference/Elements/canvas" type="pdf" width="600" height="400">
        <p>Your browser does not support the object tag.</p>

        <h2>Iframe tag</h2>
        <iframe width="560" height="315" src="https://www.youtube.com/embed/e96HaqR0mjM?si=vSSo0xhHBRbGMctt" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
            <p>Your browser does not support iframes.</p>
        

        <h2>Image Tag</h2>
        <img src="sukuna-jujutsu-5120x2880-13852.png" alt="Sample Image" width="600" height="400">

</body> 
</html>
